<script>
document.addEventListener('DOMContentLoaded', function() {
    // select2の初期化
    $('[data-control="select2"]').select2({
        dropdownCssClass: 'w-350px',
        templateResult: formatOption,
        templateSelection: formatOption,
        placeholder: $(this).data('placeholder'),
        allowClear: false
    });

    // 検索フォームにプレースホルダーを設定
    $(document).on('select2:open', function() {
        setTimeout(function() {
            $('.select2-search__field').attr('placeholder', '選択してください');
        }, 10);
    });

    // メニュー開閉の処理
    $('[data-kt-menu-trigger]').click(function() {
        var target = $(this).data('kt-menu-attach');
        $(target).find('[data-control="select2"]').select2('destroy').select2({
            dropdownCssClass: 'w-350px',
            templateResult: formatOption,
            templateSelection: formatOption,
            placeholder: $(this).data('placeholder'),
            allowClear: false
        });
    });
});

function formatOption(option) {
    if (!option.id) {
        return option.text;
    }
    var $option = $(
        '<span><img src="' + $(option.element).data('kt-select2-image') + '" class="rounded-circle h-20px w-20px me-2" />' + option.text + '</span>'
    );
    return $option;
}
</script>
