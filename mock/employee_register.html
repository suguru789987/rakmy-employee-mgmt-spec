    <script>
      // Thousand separator for number inputs
      document.addEventListener('DOMContentLoaded', function() {
        // 適用日付（カレンダー）
        if (window.jQuery && $("#reg_apply_date").length && $.fn.flatpickr) {
          $("#reg_apply_date").flatpickr({ dateFormat: "Y/m/d", allowInput: true });
        }
        const numberInputs = document.getElementsByClassName('number-input');
        Array.from(numberInputs).forEach(input => {
          let previousValue = '';
          input.addEventListener('input', function(e) {
            const rawValue = this.value.replace(/[^\d]/g, '');
            if (!rawValue) {
              this.value = '';
              previousValue = '';
              return;
            }
            try {
              const formattedValue = Number(rawValue).toLocaleString();
              this.value = formattedValue;
              previousValue = formattedValue;
            } catch {
              this.value = previousValue;
            }
          });
          input.addEventListener('focus', function() {
            const rawValue = this.value.replace(/,/g, '');
            this.value = rawValue;
          });
          input.addEventListener('blur', function() {
            if (this.value) {
              const rawValue = this.value.replace(/,/g, '');
              this.value = Number(rawValue).toLocaleString();
            }
          });
        });
      });

      // Toggle 所定労働時間 and みなし残業時間 visibility based on 雇用区分
      $(document).ready(function() {
        var workingHoursGroup = document.getElementById('working_hours_group');
        var overtimeHoursGroup = document.getElementById('overtime_hours_group');

        function toggleRegularEmployeeFields(value) {
          if (value === 'regular') {
            workingHoursGroup.style.display = '';
            overtimeHoursGroup.style.display = '';
          } else {
            workingHoursGroup.style.display = 'none';
            overtimeHoursGroup.style.display = 'none';
          }
        }

        // Listen to Select2 change event
        $('#employment_type_select').on('change', function() {
          toggleRegularEmployeeFields($(this).val());
        });

        // Handle ヘルプ先交通費 dynamic list
        var helpTransportSection = $('#help_transport_section');
        var helpTransportList = $('#help_transport_list');

        function initNumberInputFormatting(input) {
          var $input = $(input);
          $input.on('input', function() {
            var rawValue = this.value.replace(/[^\d]/g, '');
            if (!rawValue) {
              this.value = '';
              return;
            }
            this.value = Number(rawValue).toLocaleString();
          });
          $input.on('focus', function() {
            this.value = this.value.replace(/,/g, '');
          });
          $input.on('blur', function() {
            if (this.value) {
              this.value = Number(this.value.replace(/,/g, '')).toLocaleString();
            }
          });
        }

        $('select[name="help_stores"]').on('change', function() {
          var selectedOptions = $(this).find('option:selected');
          helpTransportList.empty();

          if (selectedOptions.length > 0) {
            helpTransportSection.show();
            selectedOptions.each(function() {
              var storeId = $(this).val();
              var storeName = $(this).text();
              var row = $(`
                <div class="d-flex align-items-center gap-3 mb-3" data-store-id="${storeId}">
                  <div class="badge badge-light-primary fw-bold fs-7 py-3 px-4" style="min-width: 200px;">
                    ${storeName}
                  </div>
                  <div class="input-group" style="max-width: 200px;">
                    <span class="input-group-text border-0" style="background-color: #F9F9F9;">¥</span>
                    <input type="text" name="help_transport_${storeId}"
                           class="form-control form-control-solid border-0 number-input"
                           placeholder="金額を入力" required>
                  </div>
                </div>
              `);
              helpTransportList.append(row);
              initNumberInputFormatting(row.find('input'));
            });
          } else {
            helpTransportSection.hide();
          }
        });
      });

      // Form submission with loading animation
      const submitButton = document.getElementById('employee_submit');

      submitButton.addEventListener('click', function(e) {
        e.preventDefault();

        // Show loading state
        submitButton.setAttribute('data-kt-indicator', 'on');
        submitButton.disabled = true;

        // Simulate API call
        setTimeout(function() {
          // Hide loading state
          submitButton.removeAttribute('data-kt-indicator');
          submitButton.disabled = false;

          // Show success message
          Swal.fire({
            text: "従業員を登録しました",
            icon: "success",
            buttonsStyling: false,
            confirmButtonText: "OK",
            customClass: {
              confirmButton: "btn btn-primary"
            }
          }).then((result) => {
            if (result.isConfirmed) {
              window.location.href = 'employees.html';
            }
          });
        }, 1500);
      });
    </script>
