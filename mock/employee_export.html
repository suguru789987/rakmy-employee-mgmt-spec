		<script src="assets/plugins/global/plugins.bundle.js"></script>
		<script src="assets/js/scripts.bundle.js"></script>
		<script>
			var S = 'ラクミーフレッシュ';
			var EMP = [
				{従業員コード:'EMP-001',氏名:'田中 太郎',雇用区分:'正社員',所属店舗:S+'渋谷店',ヘルプ:[S+'青山店',S+'新宿店'],給与単位:'月給',単位給与額:320000,交通費単位:'月額',単位交通費:18000,所定労働時間:160,みなし残業時間:20},
				{従業員コード:'EMP-002',氏名:'佐藤 花子',雇用区分:'正社員',所属店舗:S+'渋谷店',ヘルプ:[],給与単位:'月給',単位給与額:280000,交通費単位:'月額',単位交通費:15000,所定労働時間:160,みなし残業時間:15},
				{従業員コード:'EMP-003',氏名:'鈴木 一郎',雇用区分:'パート',所属店舗:S+'青山店',ヘルプ:[S+'渋谷店'],給与単位:'時給',単位給与額:1200,交通費単位:'日額',単位交通費:600,所定労働時間:120,みなし残業時間:0},
				{従業員コード:'EMP-004',氏名:'高橋 美咲',雇用区分:'アルバイト',所属店舗:S+'青山店',ヘルプ:[],給与単位:'時給',単位給与額:1100,交通費単位:'日額',単位交通費:500,所定労働時間:80,みなし残業時間:0},
				{従業員コード:'EMP-005',氏名:'渡辺 由美',雇用区分:'正社員',所属店舗:S+'新宿店',ヘルプ:[S+'渋谷店',S+'赤坂店'],給与単位:'月給',単位給与額:350000,交通費単位:'月額',単位交通費:22000,所定労働時間:160,みなし残業時間:30},
				{従業員コード:'EMP-006',氏名:'伊藤 健太',雇用区分:'パート',所属店舗:S+'新宿店',ヘルプ:[],給与単位:'時給',単位給与額:1300,交通費単位:'日額',単位交通費:700,所定労働時間:120,みなし残業時間:0},
				{従業員コード:'EMP-007',氏名:'山本 大輔',雇用区分:'正社員',所属店舗:S+'沖縄店',ヘルプ:[],給与単位:'月給',単位給与額:300000,交通費単位:'月額',単位交通費:30000,所定労働時間:160,みなし残業時間:20},
				{従業員コード:'EMP-008',氏名:'中村 真理',雇用区分:'アルバイト',所属店舗:S+'沖縄店',ヘルプ:[S+'新宿店'],給与単位:'時給',単位給与額:1050,交通費単位:'日額',単位交通費:800,所定労働時間:80,みなし残業時間:0},
				{従業員コード:'EMP-009',氏名:'小林 翔太',雇用区分:'正社員',所属店舗:S+'赤坂店',ヘルプ:[S+'渋谷店'],給与単位:'月給',単位給与額:260000,交通費単位:'月額',単位交通費:16000,所定労働時間:160,みなし残業時間:10},
				{従業員コード:'EMP-010',氏名:'加藤 彩',雇用区分:'パート',所属店舗:S+'赤坂店',ヘルプ:[],給与単位:'時給',単位給与額:1250,交通費単位:'日額',単位交通費:550,所定労働時間:120,みなし残業時間:0},
				{従業員コード:'EMP-011',氏名:'吉田 直樹',雇用区分:'正社員',所属店舗:S+'渋谷店',ヘルプ:[S+'沖縄店'],給与単位:'月給',単位給与額:410000,交通費単位:'月額',単位交通費:19000,所定労働時間:160,みなし残業時間:0},
				{従業員コード:'EMP-012',氏名:'山田 さくら',雇用区分:'アルバイト',所属店舗:S+'青山店',ヘルプ:[],給与単位:'時給',単位給与額:1000,交通費単位:'月額',単位交通費:10000,所定労働時間:60,みなし残業時間:0}
			];
			var TODAY = '2026/06/26';

			// 種別切替
			$('input[name="export_type"]').on('change', function() {
				if ($(this).val() === 'settings') { $('#section_settings').show(); $('#section_actual').hide(); }
				else { $('#section_settings').hide(); $('#section_actual').show(); }
			});
			// 対象チェックで項目グループ表示切替
			$('.target-chk').on('change', function() {
				$('#' + $(this).data('items')).toggle($(this).is(':checked'));
			});

			function approxSalary(e) { return e.給与単位 === '月給' ? e.単位給与額 : e.単位給与額 * e.所定労働時間; }
			function val(col, e, monthLabel) {
				switch (col) {
					case '従業員コード': return e.従業員コード;
					case '氏名': return e.氏名;
					case '雇用区分': return e.雇用区分;
					case '所属店舗': return e.所属店舗;
					case 'ヘルプ先店舗': return e.ヘルプ.join(';');
					case '給与単位': return e.給与単位;
					case '単位給与額': return e.単位給与額;
					case '交通費単位': return e.交通費単位;
					case '単位交通費': return e.単位交通費;
					case '所定労働時間': return e.所定労働時間;
					case 'みなし残業時間': return e.みなし残業時間;
					case '適用日付': return TODAY;
					case '対象年月': return monthLabel;
					case '概算給与': return approxSalary(e);
					case '総労働時間': return e.所定労働時間 + e.みなし残業時間;
					case 'ヘルプ人件費': return e.ヘルプ.length ? e.ヘルプ.length * 13000 : 0;
					case '深夜残業代': return e.みなし残業時間 > 0 ? e.みなし残業時間 * 300 : 0;
					case '実績給与': return approxSalary(e) + (e.みなし残業時間 > 0 ? e.みなし残業時間 * 300 : 0);
					default: return '';
				}
			}
			function selectedCols(groupEl) { return $(groupEl).find('.it:checked').map(function() { return $(this).data('col'); }).get(); }
			function toCsv(rows) { return rows.map(function(r) { return r.map(function(c) { c = (c == null ? '' : String(c)); return /[",\n]/.test(c) ? '"' + c.replace(/"/g, '""') + '"' : c; }).join(','); }).join('\r\n'); }
			function download(name, cols, monthLabel) {
				var rows = [cols];
				EMP.forEach(function(e) { rows.push(cols.map(function(c) { return val(c, e, monthLabel); })); });
				var blob = new Blob(['﻿' + toCsv(rows)], { type: 'text/csv;charset=utf-8;' });
				var u = URL.createObjectURL(blob);
				var a = document.createElement('a'); a.href = u; a.download = name;
				document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
			}
			function warn(t) { if (window.Swal) Swal.fire({ icon: 'warning', text: t, confirmButtonText: 'OK', buttonsStyling: false, customClass: { confirmButton: 'btn btn-primary' } }); else alert(t); }

			$('#do_export').on('click', function() {
				var type = $('input[name="export_type"]:checked').val();
				var done = [];
				if (type === 'settings') {
					var e = $('#t_employee').is(':checked'), p = $('#t_payroll').is(':checked');
					if (!e && !p) { warn('従業員設定・給与設定の少なくとも一方を選択してください'); return; }
					if (e) { var ce = selectedCols('[data-group="emp"]'); if (!ce.length) { warn('従業員設定のデータ項目を1つ以上選択してください'); return; } download('従業員設定_エクスポート.csv', ce); done.push('従業員設定'); }
					if (p) { var cp = selectedCols('[data-group="pay"]'); if (!cp.length) { warn('給与設定のデータ項目を1つ以上選択してください'); return; } download('給与設定_エクスポート.csv', cp); done.push('給与設定'); }
				} else {
					var ca = selectedCols('[data-group="act"]'); if (!ca.length) { warn('実績のデータ項目を1つ以上選択してください'); return; }
					var mv = $('#actual_month').val(), mt = $('#actual_month option:selected').text();
					download('給与実績_' + mv + '_エクスポート.csv', ca, mt); done.push('給与実績(' + mt + ')');
				}
				if (window.Swal) Swal.fire({ icon: 'success', text: done.join('・') + ' をエクスポートしました（各' + EMP.length + '件）', confirmButtonText: 'OK', buttonsStyling: false, customClass: { confirmButton: 'btn btn-primary' } });
			});
		</script>
	</body>
</html>
